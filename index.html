<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>YZE Table V2</title>

<style>
body {
  font-family: system-ui;
  max-width: 1000px;
  margin: 20px auto;
  padding: 20px;

  background:
    radial-gradient(circle at 12% 18%, rgba(60, 80, 40, 0.95) 0 18%, transparent 19%),
    radial-gradient(circle at 35% 65%, rgba(90, 110, 60, 0.9) 0 22%, transparent 23%),
    radial-gradient(circle at 70% 25%, rgba(40, 60, 30, 0.95) 0 20%, transparent 21%),
    radial-gradient(circle at 85% 75%, rgba(100, 120, 70, 0.85) 0 18%, transparent 19%),
    #2f3b22;
}

.player {
  background: rgba(255,255,255,0.85);
  border: 1px solid rgba(0,0,0,0.4);
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 6px;
}

.active {
  border: 2px solid green;
  background: rgba(220,255,220,0.9);
}

#roleBanner {
  margin-bottom: 10px;
  padding: 6px;
  background: rgba(0,0,0,0.6);
  color: white;
  font-weight: bold;
}

button { margin-left: 4px; }

table th, table td {
  padding: 6px;
  border-bottom: 1px solid rgba(0,0,0,0.1);
  vertical-align: top;
}

table {
  border-radius: 6px;
  overflow: hidden;
}

.condition-on {
  opacity: 1;
  font-size: 1.2em;
  margin-right: 4px;
}

.condition-off {
  opacity: 0.25;
  font-size: 1.2em;
  margin-right: 4px;
}
</style>
</head>

<body>

<div id="roleBanner"></div>

<h2>YZE Actor Table</h2>

<select id="actorSelect"></select>
<input id="basic" type="number" value="5" min="0">

<button onclick="roll()">Roll</button>
<button onclick="shuffle()">Shuffle</button>
<button onclick="nextTurn()">Next</button>
<button onclick="critical()">Critical</button>

<hr>

<h3>Actors</h3>
<div id="actors"></div>

<h3>History</h3>
<div id="history"></div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const isGM = urlParams.get("gm") === "1";

let ws;
let state = null;

/* ---------------- CONNECT ---------------- */

function connect() {
  ws = new WebSocket("wss://grunts-yearzero.onrender.com");

  ws.onopen = () => {
    send({ type: "setRole", role: isGM ? "gm" : "player" });
    renderRole();
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === "state") {
      state = msg.state;
      renderAll();
    }
  };
}

function send(msg) {
  if (ws?.readyState === 1) {
    ws.send(JSON.stringify(msg));
  }
}

/* ---------------- ACTIONS ---------------- */

function roll() {
  const sel = document.getElementById("actorSelect").value;
  const basic = Number(document.getElementById("basic").value) || 0;

  if (sel === "__new_npc__") {
    const name = prompt("NPC name?");
    if (!name) return;

    send({ type: "createActor", name });
    send({ type: "roll", name, basic });
    return;
  }

  if (sel === "__ad_hoc__") {
    send({ type: "adHocRoll", basic });
    return;
  }

  send({ type: "roll", name: sel, basic });
}

function panic(name) {
  send({ type: "panic", name });
}

function critical() {
  send({ type: "critical" });
}

function shuffle() {
  send({ type: "shuffleInitiative" });
}

function nextTurn() {
  send({ type: "nextTurn" });
}

function setStress(name, delta) {
  const actor = state?.actors?.[name];
  if (!actor) return;

  send({
    type: "setStress",
    name,
    stress: (actor.stress ?? 0) + delta
  });
}

function setHealth(name, delta) {
  const actor = state?.actors?.[name];
  if (!actor) return;

  send({
    type: "setHealth",
    name,
    health: (actor.health ?? 0) + delta
  });
}

function removeActor(name) {
  send({ type: "removeActor", name });
}

/* ---------------- CONDITIONS (SAFE DOM VERSION) ---------------- */

function renderCondition(id, key, symbol, cell) {
  const active = state?.actors?.[id]?.conditions?.[key];

  const span = document.createElement("span");
  span.textContent = symbol;
  span.className = active ? "condition-on" : "condition-off";
  span.title = key;

  if (isGM) {
    span.style.cursor = "pointer";
    span.onclick = () => {
      send({
        type: "setCondition",
        name: id,
        condition: key,
        value: !active
      });
    };
  }

  cell.appendChild(span);
}

/* ---------------- RENDER ROLE ---------------- */

function renderRole() {
  document.getElementById("roleBanner").innerText =
    isGM ? "GM MODE ACTIVE" : "PLAYER MODE";
}

/* ---------------- SELECT ---------------- */

function renderSelect() {
  const sel = document.getElementById("actorSelect");
  sel.innerHTML = "";

  if (!state?.actors) return;

  for (const id of Object.keys(state.actors)) {
    const a = state.actors[id];

    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = a.name ?? id;

    sel.appendChild(opt);
  }

  const sep = new Option("──────────");
  sep.disabled = true;
  sel.appendChild(sep);

  sel.appendChild(new Option("+ New NPC", "__new_npc__"));
  sel.appendChild(new Option("+ Ad Hoc Roll", "__ad_hoc__"));
}

/* ---------------- ACTORS TABLE ---------------- */

function renderActors() {
  const div = document.getElementById("actors");
  div.innerHTML = "";

  const table = document.createElement("table");
  table.style.width = "100%";
  table.style.borderCollapse = "collapse";
  table.style.background = "rgba(255,255,255,0.9)";

  table.innerHTML = `
    <thead>
      <tr>
        <th align="left">Name</th>
        <th>Stress</th>
        <th>Health</th>
        <th>Conditions</th>
        <th>Critical Injuries</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;

  const tbody = table.querySelector("tbody");
  const order = state?.turnOrder || [];

  order.forEach((id, i) => {
    const a = state?.actors?.[id];
    if (!a) return;

    const row = document.createElement("tr");

    if (i === state.currentTurnIndex) {
      row.style.background = "#dff5df";
    }

    row.innerHTML = `
      <td><b>${a.name || id}</b></td>

      <td align="center">
        ${a.stress ?? 0}
        ${isGM ? `
          <button onclick="setStress('${id}',1)">+</button>
          <button onclick="setStress('${id}',-1)">-</button>
        ` : ""}
      </td>

      <td align="center">
        ${a.health ?? 0}
        ${isGM ? `
          <button onclick="setHealth('${id}',1)">+</button>
          <button onclick="setHealth('${id}',-1)">-</button>
        ` : ""}
      </td>

      <td></td>

      <td>${(a.criticalInjuries || []).join(", ")}</td>

      <td>
        <button onclick="panic('${id}')">Panic</button>
        ${a.type === "npc"
          ? `<button onclick="removeActor('${id}')">Remove</button>`
          : ""
        }
      </td>
    `;

    const condCell = row.children[3];

    if (a.type === "pc") {
      renderCondition(id, "starving", "🍽️", condCell);
      renderCondition(id, "dehydrated", "💧", condCell);
      renderCondition(id, "exhausted", "😴", condCell);
      renderCondition(id, "freezing", "❄", condCell);
    } else {
      condCell.textContent = "—";
    }

    tbody.appendChild(row);
  });

  table.appendChild(tbody);   // ✅ CORRECT
  div.appendChild(table);
}

/* ---------------- HISTORY ---------------- */

function renderHistory() {
  const div = document.getElementById("history");
  if (!state?.history) return;

  div.innerHTML = state.history
    .slice()
    .reverse()
    .map(r => `
      <div class="player">
        <b>${state?.actors?.[r.name]?.name ?? r.name}</b> (${r.time || ""})<br>
        ${r.basic ? `Basic: ${r.basic.join(" ")}<br>` : ""}
        ${r.stress ? `Stress: ${r.stress.join(" ")}<br>` : ""}
        ${typeof r.successes === "number" ? `Successes: ${r.successes}<br>` : ""}
        ${typeof r.banes === "number" ? `Banes: ${r.banes}<br>` : ""}
        ${r.resultText ? `<b>${r.resultText}</b>` : ""}
      </div>
    `).join("");
}

/* ---------------- MASTER ---------------- */

function renderAll() {
  renderRole();
  renderSelect();
  renderActors();
  renderHistory();
}

connect();

window.setStress = setStress;
window.setHealth = setHealth;
window.panic = panic;
window.removeActor = removeActor;
window.roll = roll;
window.shuffle = shuffle;
window.nextTurn = nextTurn;
window.critical = critical;
</script>

</body>
</html>
