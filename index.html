<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>YZE Table V2</title>

<style>
body {
  font-family: system-ui;
  max-width: 1000px;
  margin: 20px auto;
  padding: 20px;

  background:
    radial-gradient(circle at 12% 18%, rgba(60, 80, 40, 0.95) 0 18%, transparent 19%),
    radial-gradient(circle at 35% 65%, rgba(90, 110, 60, 0.9) 0 22%, transparent 23%),
    radial-gradient(circle at 70% 25%, rgba(40, 60, 30, 0.95) 0 20%, transparent 21%),
    radial-gradient(circle at 85% 75%, rgba(100, 120, 70, 0.85) 0 18%, transparent 19%),
    #2f3b22;
}

.player {
  background: rgba(255,255,255,0.85);
  border: 1px solid rgba(0,0,0,0.4);
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 6px;
}

.active {
  border: 2px solid green;
  background: rgba(220,255,220,0.9);
}

#roleBanner {
  margin-bottom: 10px;
  padding: 6px;
  background: rgba(0,0,0,0.6);
  color: white;
  font-weight: bold;
}

button { margin-left: 4px; }
</style>
</head>

<body>

<div id="roleBanner"></div>

<h2>YZE Actor Table</h2>

<select id="actorSelect"></select>
<input id="newName" placeholder="NPC name">
<input id="basic" type="number" value="5">

<button onclick="roll()">Roll</button>
<button onclick="shuffle()">Shuffle</button>
<button onclick="nextTurn()">Next</button>
<button onclick="critical()">Critical</button>

<hr>

<h3>Actors</h3>
<div id="actors"></div>

<h3>History</h3>
<div id="history"></div>

<script>

const urlParams = new URLSearchParams(window.location.search);
let isGM = urlParams.get("gm") === "1";

let ws;
let state;

/* ---------------- CONNECT ---------------- */

function connect() {
  ws = new WebSocket("wss://grunts-yearzero.onrender.com");

  ws.onopen = () => {
    send({
      type: "setRole",
      role: isGM ? "gm" : "player"
    });

    renderRole();
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === "state") {
      state = msg.state;
      renderAll();
    }
  };
}

function send(msg) {
  ws.send(JSON.stringify(msg));
}

/* ---------------- UI ACTIONS ---------------- */

function roll() {
  const sel = actorSelect.value;
  const basic = Number(document.getElementById("basic").value);
  const name = document.getElementById("newName").value.trim();

  if (sel === "__new_roll__") {
    send({ type: "adHocRoll", basic });
    return;
  }

  if (sel === "__new_actor__") {
    const finalName = name || `Actor ${Math.floor(Math.random()*10000)}`;
    send({ type: "createActor", name: finalName });
    send({ type: "roll", name: finalName, basic });
    return;
  }

  send({ type: "roll", name: sel, basic });
}

function panic(name) {
  send({ type: "panic", name });
}

function critical() {
  send({ type: "critical" });
}

function shuffle() {
  send({ type: "shuffleInitiative" });
}

function nextTurn() {
  send({ type: "nextTurn" });
}

function setStress(name, delta) {
  const a = state.actors[name];

  send({
    type: "setStress",
    name,
    stress: (a.stress || 0) + delta
  });
}

/* ---------------- RENDER ---------------- */

function renderRole() {
  document.getElementById("roleBanner").innerText =
    isGM ? "GM MODE ACTIVE" : "PLAYER MODE";
}

function renderAll() {
  renderSelect();
  renderActors();
  renderHistory();
}

function renderSelect() {
  const sel = actorSelect;
  sel.innerHTML = "";

  for (const name of Object.keys(state.actors)) {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  }

  sel.innerHTML += `
    <option disabled>──────────</option>
    <option value="__new_actor__">+ New Actor</option>
    <option value="__new_roll__">+ New Roller</option>
  `;
}

function renderActors() {
  const div = document.getElementById("actors");
  div.innerHTML = "";

  const order = state.turnOrder || [];

  order.forEach((name, i) => {
    const a = state.actors[name];
    if (!a) return;

    const el = document.createElement("div");
    el.className = "player" + (i === state.currentTurnIndex ? " active" : "");

    el.innerHTML = `
      <b>${name}</b> (${a.type})<br>
      Stress: ${a.stress}

      ${isGM ? `
        <button onclick="setStress('${name}',1)">+</button>
        <button onclick="setStress('${name}',-1)">-</button>
      ` : ""}

      <button onclick="panic('${name}')">Panic</button>
    `;

    div.appendChild(el);
  });
}

function renderHistory() {
  const div = document.getElementById("history");

  div.innerHTML = (state.history || [])
    .slice()
    .reverse()
    .map(r => `
      <div class="player">
        <b>${r.name}</b> (${r.time})<br>

        ${r.basic ? `Basic: ${r.basic.join(" ")}<br>` : ""}
        ${r.stress ? `Stress: ${r.stress.join(" ")}<br>` : ""}

        ${typeof r.successes === "number" ? `Successes: ${r.successes}<br>` : ""}
        ${typeof r.banes === "number" ? `Banes: ${r.banes}<br>` : ""}

        ${r.d66 !== undefined ? `
          <hr>
          <b>D66:</b> ${r.d66}<br>
          <b>${r.injury || ""}</b><br>
        ` : ""}
      </div>
    `).join("");
}

connect();

</script>

</body>
</html>
