<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>YZE Engine (Stateful)</title>

<style>
body {
  font-family: system-ui, sans-serif;
  max-width: 1000px;
  margin: 20px auto;
  padding: 10px;
}

.row { margin-bottom: 10px; }

button {
  margin-left: 4px;
  padding: 4px 8px;
}

input, select {
  padding: 4px;
}

.player {
  border: 1px solid #ccc;
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 6px;
}

.roll {
  border: 1px solid #ccc;
  margin-top: 10px;
  padding: 10px;
  border-radius: 6px;
}

.good { color: green; font-weight: bold; }
.bad { color: darkred; font-weight: bold; }

.small { color: #666; font-size: 12px; }

.dice { letter-spacing: 2px; }
</style>
</head>

<body>

<h2>Year Zero Engine Multiplayer</h2>

<div id="status">Connecting...</div>

<hr>

<!-- ROLL PANEL -->
<div class="row">

  Character:

  <select id="player"></select>

  Basic Dice:

  <input id="basic" type="number" value="5" min="0" style="width:70px">

  <button onclick="roll()">Roll</button>

</div>

<!-- CREATE CHARACTER -->
<div class="row">

  <input id="newChar" placeholder="New character name">

  <button onclick="createCharacter()">Add Character</button>

</div>

<hr>

<!-- PLAYER LIST -->
<h3>Characters</h3>
<div id="players"></div>

<hr>

<h3>Roll History</h3>
<div id="history"></div>

<script>

let ws = null;
let gameState = null;

function connect() {

  ws = new WebSocket("wss://grunts-yearzero.onrender.com");

  ws.onopen = () => {
    document.getElementById("status").textContent = "Connected";
  };

  ws.onclose = () => {
    document.getElementById("status").textContent =
      "Disconnected (reconnecting...)";
    setTimeout(connect, 2000);
  };

  ws.onmessage = (event) => {

    const msg = JSON.parse(event.data);

    console.log("RECEIVED:", msg);

    if (msg.type === "state") {

      gameState = msg.state;

      renderPlayers();
      renderSelector();
      renderHistory();

    }

    if (msg.type === "roll") {

      gameState.history.push(msg.roll);
      renderHistory();

    }
  };
}

/*
 * SEND
 */

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

/*
 * ROLL
 */

function roll() {

  const player =
    document.getElementById("player").value;

  const basic =
    Number(document.getElementById("basic").value);

  send({
    type: "roll",
    player,
    basic
  });
}

/*
 * STRESS
 */

function addStress(name) {
  send({ type: "addStress", name });
}

function removeStress(name) {
  send({ type: "removeStress", name });
}

/*
 * CREATE CHARACTER
 */

function createCharacter() {

  const name =
    document.getElementById("newChar").value.trim();

  if (!name) return;

  send({
    type: "createCharacter",
    name
  });

  document.getElementById("newChar").value = "";
}

/*
 * RENDER SELECTOR
 */

function renderSelector() {

  const sel = document.getElementById("player");

  const current = sel.value;

  sel.innerHTML = "";

  for (const name of Object.keys(gameState.players)) {

    const opt = document.createElement("option");

    opt.value = name;
    opt.textContent = name;

    sel.appendChild(opt);
  }

  if (gameState.players[current]) {
    sel.value = current;
  }
}

/*
 * RENDER PLAYERS
 */

function renderPlayers() {

  const div = document.getElementById("players");

  div.innerHTML = "";

  for (const [name, p] of Object.entries(gameState.players)) {

    const el = document.createElement("div");
    el.className = "player";

    el.innerHTML = `
      <b>${name}</b>
      <br>
      Stress: <b>${p.stress}</b>
      <br><br>

      <button onclick="addStress('${name}')">+</button>
      <button onclick="removeStress('${name}')">-</button>
    `;

    div.appendChild(el);
  }
}

/*
 * RENDER HISTORY
 */

function renderHistory() {

  const div = document.getElementById("history");

  const rolls = [...gameState.history].reverse();

  div.innerHTML = rolls.map(r => `
    <div class="roll">

      <b>${r.name}</b>
      <span class="small">(${r.time})</span>

      <br><br>

      Stress Level: <b>${r.stressLevel}</b>

      <br><br>

      <b>Basic:</b>
      <span class="dice">${r.basic.join(" ")}</span>

      <br>

      <b>Stress:</b>
      <span class="dice">${r.stress.join(" ")}</span>

      <hr>

      <div class="good">Successes: ${r.successes}</div>
      <div class="bad">Banes: ${r.banes}</div>

    </div>
  `).join("");
}

/*
 * START
 */

connect();

</script>

</body>
</html>
