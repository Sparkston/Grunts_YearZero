<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>YZE Table V2</title>

<style>
/* keep your camouflage CSS */
</style>
</head>

<body>

<div id="roleBanner"></div>

<h2>YZE Actor Table</h2>

<select id="actorSelect"></select>
<input id="newName" placeholder="NPC name (optional)">
<input id="basic" type="number" value="5" min="0">

<button onclick="roll()">Roll</button>
<button onclick="shuffle()">Shuffle</button>
<button onclick="nextTurn()">Next</button>
<button onclick="critical()">Critical</button>

<hr>

<h3>Actors</h3>
<div id="actors"></div>

<h3>History</h3>
<div id="history"></div>
  
<script defer>

const urlParams = new URLSearchParams(window.location.search);

const isGM = urlParams.get("gm") === "1";
const pcId = urlParams.get("pc"); // PC1..PC4

let ws;
let state = null;
let pcs = {};
let pcDefs = {};

/* ---------------- CONNECT ---------------- */

function connect() {
  ws = new WebSocket("wss://grunts-yearzero.onrender.com");

  ws.onopen = () => {
    send({
      type: "setRole",
      role: isGM ? "gm" : "player",
      pc: pcId
    });

    renderRole();
  };

    ws.onmessage = (e) => {
    console.log("WS MESSAGE:", e.data);
  
    const msg = JSON.parse(e.data);
  
    if (msg.type === "state") {
      state = msg.state;
      renderAll();
    }
  };
}

function send(msg) {
  if (ws?.readyState === 1) {
    ws.send(JSON.stringify(msg));
  }
}

/* ---------------- ACTIONS ---------------- */

function getActiveName() {
  if (pcId && pcDefs[pcId]) {
    return pcDefs[pcId].callsign || pcDefs[pcId].name;
  }
  return null;
}

function roll() {
  const basic = Number(document.getElementById("basic").value) || 0;

  const name = getActiveName();
  if (name) {
    send({ type: "roll", name, basic });
    return;
  }

  const sel = document.getElementById("actorSelect").value;
  send({ type: "roll", name: sel, basic });
}

function panic(name) {
  send({ type: "panic", name });
}

function critical() {
  send({ type: "critical" });
}

function shuffle() {
  send({ type: "shuffleInitiative" });
}

function nextTurn() {
  send({ type: "nextTurn" });
}

function setStress(pc, delta) {
  const current = pcs[pc]?.stress || 0;

  send({
    type: "setStress",
    name: pc,
    stress: current + delta
  });
}

/* ---------------- RENDER ---------------- */

function renderRole() {
  const role = isGM ? "GM" : "PLAYER";
  const pcName = pcId ? ` | ${pcId}` : "";
  document.getElementById("roleBanner").innerText =
    role + pcName;
}

function renderAll() {
  renderRole();
  renderActors();
  renderHistory();
}

/* ---------------- ACTORS ---------------- */

function renderActors() {
  const div = document.getElementById("actors");
  div.innerHTML = "";

  const order = state?.turnOrder || [];

  for (let i = 0; i < order.length; i++) {
    const name = order[i];
    const a = state.actors[name];
    if (!a) continue;

    const el = document.createElement("div");
    el.className = "player" + (i === state.currentTurnIndex ? " active" : "");

    el.innerHTML = `
      <b>${name}</b><br>
      Stress: ${a.stress}

      <button onclick="panic('${name}')">Panic</button>

      ${a.type === "npc"
        ? `<button onclick="removeActor('${name}')">Remove</button>`
        : ""
      }
    `;

    div.appendChild(el);
  }
}

/* ---------------- HISTORY ---------------- */

function renderHistory() {
  const div = document.getElementById("history");
  if (!state?.history) return;

  div.innerHTML = [...state.history]
    .slice()
    .reverse()
    .map(r => `
      <div class="player">
        <b>${r.name}</b> (${r.time || ""})<br>

        ${r.basic ? `Basic: ${r.basic.join(" ")}<br>` : ""}
        ${r.stress ? `Stress: ${r.stress.join(" ")}<br>` : ""}
        ${typeof r.successes === "number" ? `Successes: ${r.successes}<br>` : ""}
        ${typeof r.banes === "number" ? `Banes: ${r.banes}<br>` : ""}
        ${r.resultText ? `<b>${r.resultText}</b>` : ""}
      </div>
    `).join("");
}

connect();

</script>

  </script>

</body>
</html>
