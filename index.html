<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>YZE Multiplayer Roller</title>

<style>
body {
  font-family: system-ui, sans-serif;
  max-width: 1000px;
  margin: 20px auto;
  padding: 10px;
}

.row {
  margin-bottom: 12px;
}

button {
  padding: 6px 12px;
  margin-right: 4px;
}

input,
select {
  padding: 4px;
}

#players {
  margin: 20px 0;
}

.player {
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 8px;
  margin-bottom: 6px;
}

.roll {
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 10px;
  margin-top: 10px;
}

.good {
  color: green;
  font-weight: bold;
}

.bad {
  color: darkred;
  font-weight: bold;
}

.small {
  color: #666;
  font-size: 12px;
}

.dice {
  letter-spacing: 2px;
}
</style>
</head>
<body>

<h2>Year Zero Engine Shared Roller</h2>

<div id="status">Connecting...</div>

<hr>

<div class="row">
  Character:

  <select id="player">
    <option value="Grunt1">Grunt1</option>
    <option value="Grunt2">Grunt2</option>
    <option value="Grunt3">Grunt3</option>
    <option value="Grunt4">Grunt4</option>
  </select>

  Basic Dice:

  <input
    id="basic"
    type="number"
    min="0"
    value="5"
    style="width:70px;"
  >

  <button onclick="rollDicePool()">
    Roll
  </button>
</div>

<div id="players"></div>

<h3>Roll History</h3>

<div id="history"></div>

<script>

let ws = null;
let gameState = null;

function connect() {

  ws = new WebSocket(
    "wss://grunts-yearzero.onrender.com"
  );

  ws.onopen = () => {
    document.getElementById("status")
      .textContent = "Connected";
  };

  ws.onclose = () => {
    document.getElementById("status")
      .textContent =
      "Disconnected - reconnecting...";

    setTimeout(connect, 2000);
  };

  ws.onerror = (err) => {
    console.log(err);
  };

  ws.onmessage = (event) => {

    const msg =
      JSON.parse(event.data);

    console.log("RECEIVED", msg);

    switch (msg.type) {

      case "state":

        gameState = msg.state;

        renderPlayers();
        renderHistory();

        break;

      case "roll":

        gameState.history.push(
          msg.roll
        );

        renderHistory();

        break;
    }
  };
}

function send(obj) {

  if (
    ws &&
    ws.readyState === WebSocket.OPEN
  ) {
    ws.send(
      JSON.stringify(obj)
    );
  }
}

function rollDicePool() {

  const player =
    document.getElementById("player")
      .value;

  const basic =
    Number(
      document.getElementById("basic")
        .value
    );

  send({
    type: "roll",
    player,
    basic
  });
}

function addStress(player) {

  send({
    type: "addStress",
    player
  });
}

function removeStress(player) {

  send({
    type: "removeStress",
    player
  });
}

function renderPlayers() {

  if (!gameState) return;

  const div =
    document.getElementById(
      "players"
    );

  div.innerHTML = "";

  for (
    const [name, player]
    of Object.entries(
      gameState.players
    )
  ) {

    const el =
      document.createElement("div");

    el.className = "player";

    el.innerHTML = `
      <b>${name}</b>
      &nbsp;&nbsp;
      Stress:
      <b>${player.stress}</b>

      <button onclick="addStress('${name}')">
        +
      </button>

      <button onclick="removeStress('${name}')">
        -
      </button>
    `;

    div.appendChild(el);
  }
}

function renderHistory() {

  if (!gameState) return;

  const div =
    document.getElementById(
      "history"
    );

  const rolls =
    [...gameState.history]
      .reverse();

  div.innerHTML =
    rolls.map(r => `

      <div class="roll">

        <b>${r.name}</b>

        <span class="small">
          (${r.time})
        </span>

        <br><br>

        Stress Level:
        <b>${r.stressLevel}</b>

        <br><br>

        <b>Basic:</b>

        <span class="dice">
          ${r.basic.join(" ")}
        </span>

        <br>

        <b>Stress:</b>

        <span class="dice">
          ${r.stress.join(" ")}
        </span>

        <hr>

        <div class="good">
          Successes:
          ${r.successes}
        </div>

        <div class="bad">
          Banes:
          ${r.banes}
        </div>

      </div>

    `).join("");
}

connect();

</script>

</body>
</html>
