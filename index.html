<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>YZE Table V2</title>

<style>
body {
  font-family: system-ui;
  max-width: 1000px;
  margin: 20px auto;
  padding: 20px;

  background:
    radial-gradient(circle at 12% 18%, rgba(60, 80, 40, 0.95) 0 18%, transparent 19%),
    radial-gradient(circle at 35% 65%, rgba(90, 110, 60, 0.9) 0 22%, transparent 23%),
    radial-gradient(circle at 70% 25%, rgba(40, 60, 30, 0.95) 0 20%, transparent 21%),
    radial-gradient(circle at 85% 75%, rgba(100, 120, 70, 0.85) 0 18%, transparent 19%),
    #2f3b22;
}

.player {
  background: rgba(255,255,255,0.85);
  border: 1px solid rgba(0,0,0,0.4);
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 6px;
}

.active {
  border: 2px solid green;
  background: rgba(220,255,220,0.9);
}

#roleBanner {
  margin-bottom: 10px;
  padding: 6px;
  background: rgba(0,0,0,0.6);
  color: white;
  font-weight: bold;
}

button { margin-left: 4px; }

/* ✅ ADD THIS TABLE STYLING BELOW */

table th, table td {
  padding: 6px;
  border-bottom: 1px solid rgba(0,0,0,0.1);
  vertical-align: top;
}

table {
  border-radius: 6px;
  overflow: hidden;
}
</style>

.condition-on {
  opacity: 1;
  font-size: 1.2em;
  margin-right: 4px;
}

.condition-off {
  opacity: 0.2;
  font-size: 1.2em;
  margin-right: 4px;
}
  
</head>

<body>

<div id="roleBanner"></div>

<h2>YZE Actor Table</h2>

<select id="actorSelect"></select>
<input id="basic" type="number" value="5" min="0">

<button onclick="roll()">Roll</button>
<button onclick="shuffle()">Shuffle</button>
<button onclick="nextTurn()">Next</button>
<button onclick="critical()">Critical</button>

<hr>

<h3>Actors</h3>
<div id="actors"></div>

<h3>History</h3>
<div id="history"></div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const isGM = urlParams.get("gm") === "1";

let ws;
let state = null;

/* ---------------- CONNECT ---------------- */

function connect() {
  ws = new WebSocket("wss://grunts-yearzero.onrender.com");

  ws.onopen = () => {
    send({
      type: "setRole",
      role: isGM ? "gm" : "player"
    });

    renderRole();
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === "state") {
      state = msg.state;
      renderAll();
    }
  };
}

function send(msg) {
  if (ws?.readyState === 1) {
    ws.send(JSON.stringify(msg));
  }
}

/* ---------------- ACTIONS ---------------- */

function roll() {
  const sel = document.getElementById("actorSelect").value;
  const basic = Number(document.getElementById("basic").value) || 0;

  if (sel === "__new_npc__") {
    const name = prompt("NPC name?");
    if (!name) return;

    send({ type: "createActor", name });
    send({ type: "roll", name, basic });
    return;
  }

  if (sel === "__ad_hoc__") {
    send({ type: "adHocRoll", basic });
    return;
  }

  send({ type: "roll", name: sel, basic });
}

function panic(name) {
  send({ type: "panic", name });
}

function critical() {
  send({ type: "critical" });
}

function shuffle() {
  send({ type: "shuffleInitiative" });
}

function nextTurn() {
  send({ type: "nextTurn" });
}

function toggleCondition(name, condition, value) {
  send({
    type: "setCondition",
    name,
    condition,
    value
  });
}
  
function setStress(name, delta) {
  const actor = state?.actors?.[name];
  if (!actor) return;

  send({
    type: "setStress",
    name,
    stress: (actor.stress ?? 0) + delta
  });
}

function setHealth(name, delta) {
  const current = state?.actors?.[name]?.health ?? 0;

  send({
    type: "setHealth",
    name,
    health: current + delta
  });
}

function removeActor(name) {
  send({ type: "removeActor", name });
}

/* ---------------- RENDER ROLE ---------------- */

function renderRole() {
  document.getElementById("roleBanner").innerText =
    isGM ? "GM MODE ACTIVE" : "PLAYER MODE";
}

/* ---------------- SELECT ---------------- */

function renderSelect() {
  const sel = document.getElementById("actorSelect");
  sel.innerHTML = "";

  if (!state?.actors) return;

  for (const id of Object.keys(state.actors)) {
    const a = state.actors[id];

    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = a.name ?? id;

    sel.appendChild(opt);
  }

  const sep = document.createElement("option");
  sep.disabled = true;
  sep.textContent = "──────────";
  sel.appendChild(sep);

  const optNPC = document.createElement("option");
  optNPC.value = "__new_npc__";
  optNPC.textContent = "+ New NPC";
  sel.appendChild(optNPC);

  const optRoll = document.createElement("option");
  optRoll.value = "__ad_hoc__";
  optRoll.textContent = "+ Ad Hoc Roll";
  sel.appendChild(optRoll);
}

/* ---------------- ACTORS (FIXED) ---------------- */

function renderCondition(id, key, symbol) {
  const active =
    state?.actors?.[id]?.conditions?.[key];

  const cls = active
    ? "condition-on"
    : "condition-off";

  if (!isGM) {
    return `
      <span
        class="${cls}"
        title="${key}"
      >
        ${symbol}
      </span>
    `;
  }

  return `
    <span
      class="${cls}"
      title="${key}"
      style="cursor:pointer"
      onclick="toggleCondition(
        '${id}',
        '${key}',
        ${!active}
      )"
    >
      ${symbol}
    </span>
  `;
}
  
function renderActors() {
  const div = document.getElementById("actors");
  div.innerHTML = "";

  const order = state?.turnOrder || [];

  // table header
  const table = document.createElement("table");
  table.style.width = "100%";
  table.style.borderCollapse = "collapse";
  table.style.background = "rgba(255,255,255,0.9)";

  table.innerHTML = `
    <thead>
      <tr>
        <th align="left">Name</th>
        <th>Stress</th>
        <th>Health</th>
        <th>Conditions</th>
        <th>Critical Injuries</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;

  const tbody = table.querySelector("tbody");

  order.forEach((id, i) => {
    const a = state.actors?.[id];
    if (!a) return;

    const isActive = i === state.currentTurnIndex;

    const conditions = a.conditions
      ? Object.entries(a.conditions)
          .filter(([_, v]) => v)
          .map(([k]) => k)
          .join(", ")
      : "";

    const injuries = Array.isArray(a.criticalInjuries)
      ? a.criticalInjuries.join(", ")
      : "";

    const row = document.createElement("tr");

    row.style.borderBottom = "1px solid #ccc";
    if (isActive) row.style.background = "#dff5df";

    row.innerHTML = `
      <td><b>${a.name || id}</b></td>

      <td align="center">
        ${a.stress ?? 0}
        ${isGM ? `
          <button onclick="setStress('${id}', 1)">+</button>
          <button onclick="setStress('${id}', -1)">-</button>
        ` : ""}
      </td>

      <td align="center">
        ${a.health ?? ""}
        ${isGM ? `
          <button onclick="setHealth('${id}', 1)">+</button>
          <button onclick="setHealth('${id}', -1)">-</button>
        ` : ""}
      </td>

      <td>
          ${a.type === "pc" ? `
            ${renderCondition(id, "starving", "🍽️")}
            ${renderCondition(id, "dehydrated", "💧")}
            ${renderCondition(id, "exhausted", "😴")}
            ${renderCondition(id, "freezing", "❄")}
          ` : "—"}
        </td>

      <td>${injuries}</td>

      <td>
        <button onclick="panic('${id}')">Panic</button>
        ${a.type === "npc"
          ? `<button onclick="removeActor('${id}')">Remove</button>`
          : ""
        }
      </td>
    `;

    tbody.appendChild(row);
  });

  div.appendChild(table);
}
/* ---------------- HISTORY ---------------- */

function renderHistory() {
  const div = document.getElementById("history");
  if (!state?.history) return;

  div.innerHTML = state.history
    .slice()
    .reverse()
    .map(r => `
      <div class="player">
        <b>${state?.actors?.[r.name]?.name ?? r.name}</b> (${r.time || ""})<br>

        ${r.basic ? `Basic: ${r.basic.join(" ")}<br>` : ""}
        ${r.stress ? `Stress: ${r.stress.join(" ")}<br>` : ""}
        ${typeof r.successes === "number" ? `Successes: ${r.successes}<br>` : ""}
        ${typeof r.banes === "number" ? `Banes: ${r.banes}<br>` : ""}
        ${r.resultText ? `<b>${r.resultText}</b>` : ""}
      </div>
    `).join("");
}

/* ---------------- MASTER RENDER ---------------- */

function renderAll() {
  renderRole();
  renderSelect();
  renderActors();
  renderHistory();
}

connect();

</script>

</body>
</html>
