<script>
let ws = null;
let log = [];

// --- DOM references (safe after DOM is ready) ---
let basicEl;
let stressEl;
let nameEl;
let out;

// --- init after DOM is ready ---
window.addEventListener("DOMContentLoaded", () => {

  basicEl = document.getElementById("basic");
  stressEl = document.getElementById("stress");
  nameEl = document.getElementById("name");
  out = document.getElementById("out");

  ws = new WebSocket("wss://grunts-yearzero.onrender.com");

  ws.onopen = () => {
    console.log("CONNECTED TO YZE SERVER");
  };

  ws.onerror = () => {
    console.error("WebSocket error");
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    // initial full history
    if (msg.type === "history") {
      log = msg.history || [];
      render();
      return;
    }

    // new roll
    if (msg.type === "roll") {
      log.push(msg.data);
      render();
    }
  };
});

// --- dice helpers ---
function rollDice(n) {
  return Array.from({ length: n }, () =>
    Math.floor(Math.random() * 6) + 1
  );
}

function count(arr, v) {
  return arr.filter(x => x === v).length;
}

// --- main roll function (called from onclick) ---
function roll() {

  console.log("ROLL CLICKED");

  if (!ws || ws.readyState !== WebSocket.OPEN) {
    alert("Not connected to server yet");
    return;
  }

  const basicCount = +basicEl.value;
  const stressCount = +stressEl.value;

  const basic = rollDice(basicCount);
  const stress = rollDice(stressCount);

  const payload = {
    type: "roll",
    data: {
      name: nameEl.value || "Unknown",
      basic,
      stress,
      successes:
        count(basic, 6) + count(stress, 6),
      banes:
        count(stress, 1),
      time: new Date().toLocaleTimeString()
    }
  };

  console.log("SENDING:", payload);

  ws.send(JSON.stringify(payload));
}

// --- render UI ---
function render() {
  if (!out) return;

  if (log.length === 0) {
    out.innerHTML = "No rolls yet";
    return;
  }

  out.innerHTML = log.map(d => `
    <div class="box">
      <b>${d.name}</b> <span class="small">(${d.time})</span><br><br>

      <b>Basic:</b> ${d.basic.join(" ")}<br>
      <b>Stress:</b> ${d.stress.join(" ")}<br>

      <hr>

      <div class="good">Successes: ${d.successes}</div>
      <div class="bad">Banes: ${d.banes}</div>
    </div>
  `).join("");
}

// expose for inline onclick
window.roll = roll;
</script>
