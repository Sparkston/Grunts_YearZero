<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>YZE Multiplayer Roller</title>

<style>
body {
  font-family: system-ui, sans-serif;
  max-width: 750px;
  margin: 20px auto;
  padding: 10px;
}

.row {
  margin-bottom: 10px;
}

input {
  width: 80px;
  margin-right: 10px;
}

button {
  padding: 8px 12px;
  cursor: pointer;
}

.box {
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 10px;
  margin-top: 10px;
}

.dice {
  letter-spacing: 3px;
}

.good { color: green; font-weight: bold; }
.bad { color: darkred; font-weight: bold; }

.small { font-size: 12px; color: #666; }
</style>
</head>

<body>

<h2>Year Zero Engine – Shared Roller</h2>

<div class="row">
  Basic:
  <input id="basic" type="number" value="3" min="0">

  Stress:
  <input id="stress" type="number" value="2" min="0">

  Player:
  <input id="name" type="text" placeholder="Name">

  <button onclick="roll()">Roll</button>
</div>

<div id="out" class="box">Connecting...</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

  // =========================
  // WebSocket connection
  // =========================
  const ws = new WebSocket("wss://grunts-yearzero.onrender.com");

  // =========================
  // DOM references (safe)
  // =========================
  const basicEl = document.getElementById("basic");
  const stressEl = document.getElementById("stress");
  const nameEl = document.getElementById("name");
  const out = document.getElementById("out");

  // session log
  let log = [];

  ws.onopen = () => {
    console.log("CONNECTED TO YZE SERVER");
    out.innerHTML = "Connected ✔";
  };

  ws.onerror = () => {
    out.innerHTML = "<b style='color:red'>Connection error</b>";
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    // full history on connect
    if (msg.type === "history") {
      log = msg.history || [];
      render();
      return;
    }

    // new roll
    if (msg.type === "roll") {
      log.push(msg.data);
      render();
    }
  };

  // =========================
  // Dice logic
  // =========================
  function rollDice(n) {
    return Array.from({ length: n }, () =>
      Math.floor(Math.random() * 6) + 1
    );
  }

  function count(arr, v) {
    return arr.filter(x => x === v).length;
  }

  // =========================
  // Roll action (global for onclick)
  // =========================
  function roll() {
    const basicCount = +basicEl.value;
    const stressCount = +stressEl.value;

    const basic = rollDice(basicCount);
    const stress = rollDice(stressCount);

    const data = {
      type: "roll",
      data: {
        name: nameEl.value || "Unknown",
        basic,
        stress,
        successes: count(basic, 6) + count(stress, 6),
        banes: count(stress, 1),
        time: new Date().toLocaleTimeString()
      }
    };

    if (ws.readyState !== WebSocket.OPEN) {
      alert("Not connected to server yet");
      return;
    }

    ws.send(JSON.stringify(data));
  }

  window.roll = roll;

  // =========================
  // Render history
  // =========================
  function render() {
    if (log.length === 0) {
      out.innerHTML = "No rolls yet";
      return;
    }

    out.innerHTML = log.map(d => `
      <div class="box">
        <b>${d.name}</b> <span class="small">(${d.time})</span><br><br>

        <b>Basic:</b> <span class="dice">${d.basic.join(" ")}</span><br>
        <b>Stress:</b> <span class="dice">${d.stress.join(" ")}</span><br>

        <hr>

        <div class="good">Successes: ${d.successes}</div>
        <div class="bad">Banes: ${d.banes}</div>
      </div>
    `).join("");
  }

});
</script>

</body>
</html>
