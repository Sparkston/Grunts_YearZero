<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>YZE Multiplayer Roller</title>

<style>
body {
  font-family: system-ui, sans-serif;
  max-width: 720px;
  margin: 20px auto;
  padding: 10px;
}

h2 { margin-bottom: 10px; }

.row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 10px;
}

input {
  width: 70px;
  padding: 4px;
}

button {
  padding: 8px 12px;
  cursor: pointer;
}

.box {
  margin-top: 15px;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 8px;
}

.dice {
  font-size: 18px;
  letter-spacing: 3px;
}

.good { color: green; font-weight: bold; }
.bad { color: darkred; font-weight: bold; }

.small {
  font-size: 12px;
  color: #666;
}
</style>
</head>

<body>

<h2>Year Zero Engine – Shared Roller</h2>

<div class="small">
Connected to: <code>grunts-yearzero.onrender.com</code>
</div>

<hr>

<div class="row">
  Basic dice:
  <input id="basic" type="number" value="3" min="0">

  Stress dice:
  <input id="stress" type="number" value="2" min="0">

  <button onclick="roll()">Roll</button>
</div>

<div class="row">
  Player name:
  <input id="name" placeholder="optional">
</div>

<div id="out" class="box">
  Waiting for rolls...
</div>

<script>
const ws = new WebSocket("wss://grunts-yearzero.onrender.com");

ws.onopen = () => {
  renderMessage("Connected to dice server.");
};

ws.onmessage = (event) => {
  const data = JSON.parse(event.data);
  render(data);
};

ws.onerror = () => {
  renderMessage("Connection error.");
};

function rollDice(n){
  return Array.from({length:n}, () => Math.floor(Math.random()*6)+1);
}

function count(arr, v){
  return arr.filter(x => x === v).length;
}

function roll(){
  const basicCount = +document.getElementById("basic").value;
  const stressCount = +document.getElementById("stress").value;
  const playerName = document.getElementById("name").value || "Unknown";

  const basic = rollDice(basicCount);
  const stress = rollDice(stressCount);

  const data = {
    name: playerName,
    basic,
    stress,
    successes: count(basic,6) + count(stress,6),
    banes: count(stress,1),
    time: new Date().toLocaleTimeString()
  };

  ws.send(JSON.stringify(data));
}
  
function render(data){
  out.innerHTML = `
    <div><b>${data.name}</b> <span class="small">(${data.time})</span></div>

    <div><b>Basic:</b> <span class="dice">${data.basic.join(" ")}</span></div>
    <div><b>Stress:</b> <span class="dice">${data.stress.join(" ")}</span></div>

    <hr>

    <div class="good">Successes: ${data.successes}</div>
    <div class="bad">Banes (Stress 1s): ${data.banes}</div>
  `;
}

function renderMessage(msg){
  out.innerHTML = `<div class="small">${msg}</div>`;
}
</script>

</body>
</html>
